batch_id: "dev_regression"
binary: "./build/tb_dual_port_ram/tb_dual_port_ram.out"
output_dir: "runs"
max_time_ps: 100000000000   # 100 ms default; overrideable per entry
heartbeat_ms: 2000          # progress.jsonl heartbeat interval

runs:
  - test: default
    count: 30              # 30 randomly-generated seeds

  - test: directed
    seeds: [1, 2, 3]      # explicit seeds

resources:                # ignored by LocalBackend; used by SlurmBackend when implemented
  cpus: 1
  mem_mb: 1024
  time_limit_min: 10
