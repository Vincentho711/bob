name: Nightly Regression

on:
  schedule:
    - cron: '0 0 * * 1-5'  # midnight UTC = 4 PM PST / 5 PM PDT, Mon-Fri
  workflow_dispatch:         # allow manual trigger

# Prevent two simultaneous nightly runs (e.g. two manual triggers) from
# writing to the same runs/ directory. A second trigger queues rather than
# cancels so no run is lost.
concurrency:
  group: nightly
  cancel-in-progress: false

env:
  IMAGE_REPO: ghcr.io/vincentho711/bob-env

jobs:
  nightly-regression:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          image_repo: ${{ env.IMAGE_REPO }}

      - name: Run unit tests
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run pytest pytests/ -v

      - name: Build simulation binaries
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run python main_cli.py build --all

      - name: Run nightly regression
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" \
            uv run python -m campaign.campaign_runner \
              --plan regression_plans/nightly.yaml

      - name: Aggregate coverage
        if: always()
        run: |
          BATCH_DIR=$(ls -td runs/*/ 2>/dev/null | head -1)
          if [ -z "$BATCH_DIR" ]; then
            echo "No batch directory found — skipping coverage aggregation"
            exit 0
          fi
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" \
            uv run python -m campaign.merge_coverage \
              --batch-dir "$BATCH_DIR"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore

      - name: Upload repro scripts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reproduce-scripts-${{ github.run_id }}
          path: runs/**/reproduce.sh
          if-no-files-found: ignore
