name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 ────────────────────────────────────────────────────────────────────
  # Build and push the environment image when the environment spec changes.
  # Runs on GitHub-hosted runner (Docker pre-installed).
  # Skips the build steps when Dockerfile/pyproject.toml/uv.lock are unchanged,
  # but always runs so downstream jobs can read its outputs.
  #
  # Tagging strategy:
  #   push to main → sha-<7-char-sha>  +  latest
  #   pull request → pr-<pr-number>         (latest is NOT updated)
  # ─────────────────────────────────────────────────────────────────────────────
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      env-changed: ${{ steps.filter.outputs.env }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect environment spec changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            env:
              - Dockerfile
              - pyproject.toml
              - uv.lock

      - name: Log in to GHCR
        if: steps.filter.outputs.env == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.filter.outputs.env == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bob-env
          # sha tag is listed first so outputs.version = sha-<hash> (used by
          # downstream jobs). latest is only pushed on merges to main, not PRs.
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr,prefix=pr-

      - name: Build and push
        if: steps.filter.outputs.env == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/bob-env:latest
          cache-to: type=inline

  # ── Job 2 ────────────────────────────────────────────────────────────────────
  # Run tests and builds using the canonical Apptainer image.
  # Waits for build-image so it always uses the freshest image for this commit.
  #
  # Image selection priority:
  #   1. env-changed == true  → use the image just built (PR or main)
  #   2. BOB_SIF_PATH set     → use NFS .sif (fast, no pull)
  #   3. fallback             → pull latest from GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  test-and-build:
    needs: build-image
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Apptainer image
        run: |
          ENV_CHANGED="${{ needs.build-image.outputs.env-changed }}"
          IMAGE_TAG="${{ needs.build-image.outputs.image-tag }}"
          IMAGE_TAG="${IMAGE_TAG:-latest}"

          if [ "${ENV_CHANGED}" = "true" ]; then
            # Always pull the freshly built image so this commit is tested
            # against the environment it was built with.
            echo "Pulling freshly built image: ${IMAGE_TAG}"
            apptainer pull --force bob-env.sif \
              "docker://ghcr.io/${{ github.repository_owner }}/bob-env:${IMAGE_TAG}"
            echo "SIF=$(pwd)/bob-env.sif" >> "$GITHUB_ENV"
          elif [ -n "${BOB_SIF_PATH}" ] && [ -f "${BOB_SIF_PATH}" ]; then
            echo "Using shared .sif: ${BOB_SIF_PATH}"
            echo "SIF=${BOB_SIF_PATH}" >> "$GITHUB_ENV"
          else
            echo "Pulling latest from GHCR"
            apptainer pull --force bob-env.sif \
              "docker://ghcr.io/${{ github.repository_owner }}/bob-env:${IMAGE_TAG}"
            echo "SIF=$(pwd)/bob-env.sif" >> "$GITHUB_ENV"
          fi

      - name: Install Python dependencies
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv sync --frozen

      - name: Run tests
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run pytest pytests/ -v

      - name: Build all tasks
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run python main_cli.py build --all

      - name: Campaign regression (dry run on PRs, full run on main)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            EXTRA_FLAGS="--dry-run"
          else
            EXTRA_FLAGS=""
          fi
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" \
            uv run python -m campaign.campaign_runner \
              --plan campaign.yaml $EXTRA_FLAGS

      - name: Upload campaign results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-results-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore

  # ── Job 3 ────────────────────────────────────────────────────────────────────
  # Deploy the new .sif to NFS after a successful merge to main.
  # Only runs when the environment spec changed AND all tests passed.
  # Engineers pick up the new environment automatically on their next bob-shell.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-sif:
    needs: [build-image, test-and-build]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-image.result == 'success' &&
      needs.build-image.outputs.env-changed == 'true' &&
      needs.test-and-build.result == 'success'
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy .sif to NFS
        run: |
          BOB_NFS_IMAGE_DIR=/nfs/images \
            ./scripts/update-env.sh "${{ needs.build-image.outputs.image-tag }}"
