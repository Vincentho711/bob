name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref when a newer commit arrives,
# preventing duplicate runs when both push and pull_request fire together.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/vincentho711/bob-env

jobs:
  # ── Job 1 ────────────────────────────────────────────────────────────────────
  # Build and push the environment image when the environment spec changes.
  # Runs on GitHub-hosted runner (Docker pre-installed).
  # Skips the build steps when Dockerfile/pyproject.toml/uv.lock are unchanged,
  # but always runs so downstream jobs can read its outputs.
  #
  # Tagging strategy:
  #   push to main → sha-<7-char-sha>  +  latest
  #   pull request → pr-<pr-number>         (latest is NOT updated)
  # ─────────────────────────────────────────────────────────────────────────────
  build-env:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      env-changed: ${{ steps.filter.outputs.env }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect env spec changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            env:
              - Dockerfile
              - pyproject.toml
              - uv.lock

      - name: Authenticate to GHCR
        if: steps.filter.outputs.env == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: steps.filter.outputs.env == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          # sha tag is listed first so outputs.version = sha-<hash> (used by
          # downstream jobs). latest is only pushed on merges to main, not PRs.
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr,prefix=pr-

      - name: Build and push image
        if: steps.filter.outputs.env == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:latest
          cache-to: type=inline

  # ── Job 2 ────────────────────────────────────────────────────────────────────
  # Run unit tests, build simulation binaries, and execute the smoke regression.
  # Waits for build-env so it always uses the freshest image for this commit.
  #
  # Image selection priority (via setup-env composite action):
  #   1. env-changed == true  → pull the image just built (PR or main)
  #   2. BOB_SIF_PATH set     → use NFS .sif (fast, no pull)
  #   3. fallback             → pull latest from GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-regression:
    needs: build-env
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          image_repo: ${{ env.IMAGE_REPO }}
          image_tag: ${{ needs.build-env.outputs.image-tag || 'latest' }}
          force_pull: ${{ needs.build-env.outputs.env-changed }}

      - name: Run unit tests
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run pytest pytests/ -v

      - name: Build simulation binaries
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" uv run python main_cli.py build --all

      - name: Validate smoke plan
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" \
            uv run python -m campaign.campaign_runner \
              --plan regression_plans/smoke.yaml --validate

      - name: Run smoke regression
        run: |
          apptainer exec \
            --bind "$GITHUB_WORKSPACE" --pwd "$GITHUB_WORKSPACE" \
            "$SIF" \
            uv run python -m campaign.campaign_runner \
              --plan regression_plans/smoke.yaml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-results-${{ github.run_id }}
          path: runs/
          if-no-files-found: ignore

      - name: Upload repro scripts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-scripts-${{ github.run_id }}
          path: runs/**/reproduce.sh
          if-no-files-found: ignore

  # ── Job 3 ────────────────────────────────────────────────────────────────────
  # Deploy the new .sif to NFS after a successful merge to main.
  # Only runs when the environment spec changed AND all tests passed.
  # Engineers pick up the new environment automatically on their next bob-shell.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-env:
    needs: [build-env, smoke-regression]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-env.result == 'success' &&
      needs.build-env.outputs.env-changed == 'true' &&
      needs.smoke-regression.result == 'success'
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy environment image
        run: |
          BOB_NFS_IMAGE_DIR=/nfs/images \
            ./scripts/update-env.sh "${{ needs.build-env.outputs.image-tag }}"
