gcc:
  # Linux — version 13.3.0 (Ubuntu 24.04 default; pinned in Dockerfile)
  path: /usr/bin/gcc
  # macOS latest
  # path: /opt/homebrew/bin/gcc
  default_flags :
    common: ["-Wall", "-Wextra"]

g++:
  # Linux — version 13.3.0 (Ubuntu 24.04 default; pinned in Dockerfile)
  path: /usr/bin/g++
  # macOS latest
  # path: /opt/homebrew/bin/g++
  default_flags :
    common: ["-Wall", "-Wextra", "-std=c++20"]
    linux: ["-fsanitize=address,undefined", "-pg"]

verilator:
  # Linux — version 5.020 (apt package 5.020-1; pinned in Dockerfile)
  path: /usr/bin/verilator
  # macOS deprecated
  # path: /opt/homebrew/bin/verilator
  # macOS latest with gcc built verilator
  # path: /Users/vincentho/Projects/tools/verilator/bin/verilator
  default_flags :
    common: []

ar:
  # Linux — version 2.42 (binutils, Ubuntu 24.04 default; pinned in Dockerfile)
  path: /usr/bin/ar
  default_flags :
    common: []
